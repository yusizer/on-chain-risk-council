name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (no emit)
        run: npx tsc --noEmit --incremental false --pretty false
      - name: Lint
        run: npm run lint
      - name: Unit tests
        # Deterministic, offline tests (no DASHSCOPE/HELIUS keys required).
        run: npm test
